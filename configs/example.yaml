# RunRun Example Configuration

server:
  port: 8080
  log_level: "info"
  max_concurrent_tasks: 5
  session_timeout: 24h
  log_directory: "./logs"
  shutdown_timeout: 5m

auth:
  jwt_secret: "this-is-a-very-long-secret-key-for-jwt-signing-at-least-32-chars"
  users:
    - username: "admin"
      password: "$2a$10$Fsat6IhPZc9EW5oE.mzV4eQuTC57ET/SsCSHfAsBSXWITbTaYJa2u"  # "password"
    - username: "operator"
      password: "$2a$10$Fsat6IhPZc9EW5oE.mzV4eQuTC57ET/SsCSHfAsBSXWITbTaYJa2u"  # "password"

tasks:
  - name: "hello-world"
    description: "Simple hello world task"
    tags: ["demo", "simple"]
    timeout: 1m
    working_directory: "."
    steps:
      - name: "Print message"
        command: "echo 'Hello, World!'"
      - name: "sleep 10 seconds"
        command: "sleep 10"
      - name: "Print message"
        command: "echo 'Hello, World!'"
      - name: "Print message"
        command: "echo 'Hello, World!'"

  - name: "system-info"
    description: "Display system information"
    tags: ["monitoring", "system"]
    timeout: 30s
    steps:
      - name: "Show hostname"
        command: "hostname"
      - name: "Show uptime"
        command: "uptime"
      - name: "Show disk usage"
        command: "df -h"

  - name: "env-example"
    description: "Example task with environment variables"
    tags: ["demo", "env"]
    timeout: 1m
    environment:
      GREETING: "Hello"
      TARGET: "RunRun"
    steps:
      - name: "Print environment"
        command: "echo $GREETING, $TARGET!"
